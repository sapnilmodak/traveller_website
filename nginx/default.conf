# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name miracleladakhadventure.com www.miracleladakhadventure.com admin.miracleladakhadventure.com api.miracleladakhadventure.com;
    return 301 https://$host$request_uri;
}

# Main Frontend (HTTPS)
server {
    listen 443 ssl;
    server_name miracleladakhadventure.com www.miracleladakhadventure.com;

    ssl_certificate /etc/letsencrypt/live/miracleladakhadventure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miracleladakhadventure.com/privkey.pem;

    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin Frontend (HTTPS)
server {
    listen 443 ssl;
    server_name admin.miracleladakhadventure.com;

    ssl_certificate /etc/letsencrypt/live/miracleladakhadventure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miracleladakhadventure.com/privkey.pem;

    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    location / {
        proxy_pass http://admin_frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Backend API (HTTPS)
server {
    listen 443 ssl;
    server_name api.miracleladakhadventure.com;

    ssl_certificate /etc/letsencrypt/live/miracleladakhadventure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miracleladakhadventure.com/privkey.pem;

    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        client_max_body_size 50M;
    }
}
