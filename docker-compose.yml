

services:
  mongodb:
    image: mongo:latest
    container_name: traveler_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: traveler_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: traveler_frontend
    restart: unless-stopped
    # Port removed to avoid conflict with gateway
    depends_on:
      - backend

  admin_frontend:
    build: ./admin_frontend
    container_name: traveler_admin_frontend
    restart: unless-stopped
    # Port removed to avoid conflict with gateway
    depends_on:
      - backend

  gateway:
    image: nginx:alpine
    container_name: traveler_gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - admin_frontend
      - backend

volumes:
  mongodb_data:
