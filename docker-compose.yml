version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: traveler_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: traveler_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: traveler_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  admin_frontend:
    build: ./admin_frontend
    container_name: traveler_admin_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
